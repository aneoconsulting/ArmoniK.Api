name: Tests

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  csharp:
    name: Test C#
    strategy:
      fail-fast: false
      matrix:
        dotnet:
          - version: ''
            framework: net4.7
          - version: ''
            framework: net4.8
          - version: 6.0
            framework: net6.0
          - version: 8.0
            framework: net8.0
        platform:
          - os: ubuntu-latest
            runtime: linux-x64
          - os: windows-2019
            runtime: windows-x64
          - os: windows-2022
            runtime: windows-x64
        handler:
          - ''
          - GrpcWebHandler
        exclude:
          - dotnet:
              version: ''
            platform:
              os: ubuntu-latest
          - dotnet:
              version: 6.0
            handler: GrpcWebHandler
          - dotnet:
              version: 8.0
            handler: GrpcWebHandler
        endpoint:
          - mock_env:
              Grpc__Port: 5000
              Http__Port: 4999
          - mock_env:
              Grpc__Port: 5001
              Http__Port: 5001
              Http__Cert: certs/server1.pem
              Http__Key: certs/server1.key
          - mock_env:
              Grpc__Port: 5002
              Http__Port: 5002
              Http__Cert: certs/server2.pem
              Http__Key: certs/server2.key
          - mock_env:
              Grpc__Port: 5003
              Http__Port: 5003
              Http__Cert: certs/server1.pem
              Http__Key: certs/server1.key
              Http__ClientCert: certs/client-ca.pem
          - mock_env:
              Grpc__Port: 5004
              Http__Port: 5004
              Http__Cert: certs/server2.pem
              Http__Key: certs/server2.key
              Http__ClientCert: certs/client-ca.pem
    runs-on: ${{ matrix.platform.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4
        with:
          fetch-depth: 0

      - name: Generate certs
        working-directory: packages/csharp/
        shell: bash
        run: |
          mkdir certs
          cd certs
          ../../../scripts/certs.sh
      - name: Install certs
        if: ${{ matrix.platform.os == 'ubuntu-latest' }}
        working-directory: packages/csharp/certs
        run: |
          sudo apt install ca-certificates
          sudo mkdir -p /usr/local/share/ca-certificates/
          sudo cp server2-ca.pem /usr/local/share/ca-certificates/ca.crt
          sudo update-ca-certificates
      - name: Install certs
        if: ${{ contains(matrix.platform.os, 'windows') }}
        working-directory: packages/csharp/certs
        run: |
          certutil -addstore -f "ROOT" server2-ca.pem

      - name: Install .NET Core
        uses: actions/setup-dotnet@6bd8b7f7774af54e05809fcc5431931b3eb1ddee # v4
        if: ${{ matrix.dotnet.version }} != ""
        with:
          dotnet-version: ${{ matrix.dotnet.version }}

      - name: Build Mock server
        working-directory: packages/csharp/ArmoniK.Api.Mock
        shell: bash
        run: |
          dotnet publish -o ../out
          [ -e ../out/ArmoniK.Api.Mock.exe ] || ln -s ArmoniK.Api.Mock ../out/ArmoniK.Api.Mock.exe

      - name: Run Mock servers
        working-directory: packages/csharp/
        shell: bash
        env: ${{ matrix.endpoint.mock_env }}
        run: |
          export CertFolder="$PWD/certs"
          printenv | grep Grpc
          ./out/ArmoniK.Api.Mock.exe &
          echo "server_pid=$!" >> $GITHUB_ENV
          sleep 5

      - name: Run Test
        working-directory: packages/csharp/
        shell: bash
        env:
          GrpcClient__HttpMessageHandler: ${{ matrix.handler }}
        run: |
          cd ArmoniK.Api.Client.Test
          dotnet test -f ${{ matrix.dotnet.framework }} --logger "trx;LogFileName=test-results.trx"; ret=$?

          exit $ret

      - name: Stop Mock Server
        if: always()
        working-directory: packages/csharp/
        run: |
          kill $server_pid || true

      - name: Test Report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: ConnectivityTests ${{ matrix.platform.os }} ${{ matrix.dotnet.framework }} ${{ matrix.handler }}
          path: ./packages/csharp/ArmoniK.Api.Client.Test/TestResults/test-results.trx
          reporter: dotnet-trx
